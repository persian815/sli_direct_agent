# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Build and deploy a container to an Azure Web App

env:
  AZURE_WEBAPP_NAME: directai   # set this to your application's name

on:
  push:
    branches:
      - main

permissions:
  contents: 'read'
  packages: 'write'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: directai.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          ecr: false
          logout: true

      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: build and push image to ACR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true          
          tags: directai.azurecr.io/persian815/sli_direct_agent:${{ github.sha }},directai.azurecr.io/persian815/sli_direct_agent:latest

  deploy:
    runs-on: ubuntu-latest

    needs: build

    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Lowercase the repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: directai
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: directai.azurecr.io/persian815/sli_direct_agent:latest

      - name: Check Azure credentials
        run: |
          # Check if all required Azure credentials are set
          if [[ -z "${{ secrets.AZURE_CLIENT_ID }}" ]]; then
            echo "::error::AZURE_CLIENT_ID secret is not set. Please set it in your repository secrets."
            exit 1
          fi
          
          if [[ -z "${{ secrets.AZURE_CLIENT_SECRET }}" ]]; then
            echo "::error::AZURE_CLIENT_SECRET secret is not set. Please set it in your repository secrets."
            exit 1
          fi
          
          if [[ -z "${{ secrets.AZURE_TENANT_ID }}" ]]; then
            echo "::error::AZURE_TENANT_ID secret is not set. Please set it in your repository secrets."
            exit 1
          fi
          
          echo "All required Azure credentials are set."

      - name: Set Azure AI Foundry API credentials
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Login with service principal
            az login --service-principal \
              --username "${{ secrets.AZURE_CLIENT_ID }}" \
              --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
              --tenant "${{ secrets.AZURE_TENANT_ID }}"
            
            # List available subscriptions
            echo "Available subscriptions:"
            az account list --query "[].{name:name, id:id}" --output table
            
            # Get the first available subscription
            SUBSCRIPTION_ID=$(az account list --query "[0].id" --output tsv)
            
            if [[ -z "$SUBSCRIPTION_ID" ]]; then
              echo "::error::No subscriptions found for the service principal. Please assign a role to the service principal for a subscription."
              exit 1
            fi
            
            echo "Using subscription: $SUBSCRIPTION_ID"
            
            # Set subscription
            az account set --subscription "$SUBSCRIPTION_ID"
            
            # Get Azure AI Foundry endpoint
            AI_FOUNDRY_ENDPOINT=$(az ml workspace show --name team2_seongryongle-8914 --resource-group slihackathon-2025-team2-rg --query "endpoint" --output tsv)
            
            # Get Azure AI Foundry API key
            AI_FOUNDRY_API_KEY=$(az ml workspace keys list --name team2_seongryongle-8914 --resource-group slihackathon-2025-team2-rg --query "keys[0].key" --output tsv)
            
            # Set application settings
            az webapp config appsettings set --name directai --resource-group slihackathon-2025-team2-rg --settings AZURE_AI_FOUNDRY_ENDPOINT=$AI_FOUNDRY_ENDPOINT AZURE_AI_FOUNDRY_API_KEY=$AI_FOUNDRY_API_KEY
            
            # Restart the web app
            az webapp restart --name directai --resource-group slihackathon-2025-team2-rg

      - name: Assign permissions to managed identity
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Login with service principal
            az login --service-principal \
              --username "${{ secrets.AZURE_CLIENT_ID }}" \
              --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
              --tenant "${{ secrets.AZURE_TENANT_ID }}"
            
            # Get the first available subscription
            SUBSCRIPTION_ID=$(az account list --query "[0].id" --output tsv)
            
            if [[ -z "$SUBSCRIPTION_ID" ]]; then
              echo "::error::No subscriptions found for the service principal. Please assign a role to the service principal for a subscription."
              exit 1
            fi
            
            echo "Using subscription: $SUBSCRIPTION_ID"
            
            # Set subscription
            az account set --subscription "$SUBSCRIPTION_ID"
            
            # Get the managed identity of the web app
            MANAGED_IDENTITY=$(az webapp identity show --name directai --resource-group slihackathon-2025-team2-rg --query principalId --output tsv)
            
            # Get the Azure AI Foundry workspace resource ID
            WORKSPACE_ID=$(az ml workspace show --name team2_seongryongle-8914 --resource-group slihackathon-2025-team2-rg --query id --output tsv)
            
            # Assign the "Azure AI Foundry User" role to the managed identity
            az role assignment create --assignee $MANAGED_IDENTITY --role "Azure AI Foundry User" --scope $WORKSPACE_ID
            
            # Assign the "Reader" role to the managed identity for the workspace
            az role assignment create --assignee $MANAGED_IDENTITY --role "Reader" --scope $WORKSPACE_ID
            
            # Restart the web app to apply the changes
            az webapp restart --name directai --resource-group slihackathon-2025-team2-rg
