name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: slidirectagent
  CONTAINER_APP_NAME: sli-direct-agent
  RESOURCE_GROUP: SLI-Direct-Agent
  CONTAINER_APP_ENVIRONMENT: sli-direct-agent-env
  CONTAINER_APP_LOCATION: eastasia
  CONTAINER_APP_IMAGE: slidirectagent.azurecr.io/sli-direct-agent:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Set up Azure CLI
        uses: azure/setup-az@v1
        with:
          version: 'latest'

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Dependencies installed successfully"

      - name: Get Azure ML workspace info
        run: |
          echo "Installing Azure ML extension..."
          az extension add --name azure-cli-ml || { echo "Failed to install Azure ML extension"; exit 1; }
          
          echo "Verifying Azure ML extension installation..."
          az extension list | grep -i ml || { echo "Azure ML extension not found in installed extensions"; exit 1; }
          
          echo "Getting Azure ML workspace info..."
          WORKSPACE_INFO=$(az ml workspace show --name sli-direct-agent --resource-group SLI-Direct-Agent --query "{subscription_id:id,workspace_name:name,resource_group:resourceGroup}" -o json) || { echo "Failed to get workspace info"; exit 1; }
          
          echo "Workspace info: $WORKSPACE_INFO"
          
          echo "Setting environment variables..."
          echo "AZURE_ML_WORKSPACE_INFO=$WORKSPACE_INFO" >> $GITHUB_ENV
          echo "Environment variables set successfully"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
          ecr: false
          logout: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.CONTAINER_APP_IMAGE }}
          cache-from: type=registry,ref=${{ env.CONTAINER_APP_IMAGE }}
          cache-to: type=inline

      - name: Deploy to Azure Container Apps
        run: |
          echo "Deploying to Azure Container Apps..."
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.CONTAINER_APP_IMAGE }} \
            --set-env-vars "AZURE_ML_WORKSPACE_INFO=${{ env.AZURE_ML_WORKSPACE_INFO }}" || { echo "Failed to deploy to Container Apps"; exit 1; }
          echo "Deployment completed successfully"