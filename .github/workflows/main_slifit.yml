# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - slifit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)

      # ✅ output.tar.gz 압축 해제 단계
      - name: Extract output.tar.gz before zipping
        run: |
          if [ -f output.tar.gz ]; then
            echo "🔍 Found output.tar.gz, extracting it..."
            tar -xvf output.tar.gz
            echo "✅ Extraction complete."
          else
            echo "⚠️ output.tar.gz not found, skipping extraction."
          fi

      # ✅ Compress files into output.tar.gz
      - name: Compress files into output.tar.gz
        run: |
          tar -czf output.tar.gz -C /home/site/wwwroot .
          echo "✅ Compression complete."

      # ✅ 배포용 zip 생성 (venv 제외)
      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "venv/*"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

      # ✅ Copy files from /tmp/zipdeploy/extracted to /home/site/wwwroot
      - name: Copy files from /tmp/zipdeploy/extracted to /home/site/wwwroot
        run: |
          if [ -d "/tmp/zipdeploy/extracted" ]; then
            echo "Found /tmp/zipdeploy/extracted directory, copying files to /home/site/wwwroot..."
            cp -r /tmp/zipdeploy/extracted/* /home/site/wwwroot/
            echo "Files copied successfully. Directory contents after copying:"
            ls -la /home/site/wwwroot
          else
            echo "/tmp/zipdeploy/extracted directory not found."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F76EDFB67B354031AD4CC7394B32C20E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBB0083086864CB49B41404B265F2EDC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_10EEEC58C0A144A6AF267A34FF099211 }}

      - name: Check deployment status
        run: |
          DEPLOYMENT_STATUS=$(az webapp deployment list-publishing-profiles --name slifit --resource-group slihackathon-2025-team2-rg --query "[?name=='${{ github.sha }}'].status" -o tsv)
          if [ "$DEPLOYMENT_STATUS" = "InProgress" ]; then
            echo "Deployment is still in progress. Waiting..."
            sleep 60
          fi

      - name: "Deploy to Azure Web App"
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "slifit"
          slot-name: "Production"
          timeout-minutes: 20
