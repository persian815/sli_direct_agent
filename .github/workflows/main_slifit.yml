# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - slifit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)

      # ✅ Create output.zip
      - name: Create output.zip
        run: |
          echo "Creating output.zip..."
          zip -r output.zip . -x "venv/*" ".git/*" "output.zip"
          echo "✅ output.zip created successfully."
          ls -la output.zip

      # ✅ Extract output.zip to verify it works
      - name: Extract output.zip to verify
        run: |
          if [ -f output.zip ]; then
            echo "🔍 Found output.zip, extracting it to verify..."
            mkdir -p extracted
            unzip -q output.zip -d extracted
            echo "✅ Extraction complete. Contents of extracted directory:"
            ls -la extracted
          else
            echo "⚠️ output.zip not found, something went wrong with creation."
          fi

      # ✅ 배포용 zip 생성 (venv 제외)
      - name: Zip artifact for deployment
        run: |
          # Create .deployment file
          echo "[config]" > .deployment
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT=true" >> .deployment
          echo "command = bash deploy.sh" >> .deployment
          
          # Create deploy.sh file
          echo "#!/bin/bash" > deploy.sh
          echo "" >> deploy.sh
          echo "# 디렉토리 생성" >> deploy.sh
          echo "mkdir -p /home/site/wwwroot" >> deploy.sh
          echo "" >> deploy.sh
          echo "# 현재 디렉토리의 모든 파일을 /home/site/wwwroot로 복사" >> deploy.sh
          echo "cp -r * /home/site/wwwroot/" >> deploy.sh
          echo "" >> deploy.sh
          echo "# 필요한 경우 파일 권한 설정" >> deploy.sh
          echo "chmod -R 755 /home/site/wwwroot" >> deploy.sh
          echo "" >> deploy.sh
          echo "# 배포 완료 메시지 출력" >> deploy.sh
          echo "echo \"Deployment completed successfully.\"" >> deploy.sh
          
          # Make deploy.sh executable
          chmod +x deploy.sh
          
          # Create release.zip
          zip -r release.zip . -x "venv/*" "output.zip"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            output.zip
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip -o release.zip
          echo "Files extracted to the current directory. Directory contents:"
          echo "----------------------------------------"
          ls -la
          echo "----------------------------------------"
          echo "Directory structure:"
          find . -type f -o -type d | sort
          echo "----------------------------------------"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F76EDFB67B354031AD4CC7394B32C20E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DBB0083086864CB49B41404B265F2EDC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_10EEEC58C0A144A6AF267A34FF099211 }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Check deployment status
        run: |
          DEPLOYMENT_STATUS=$(az webapp deployment list-publishing-profiles --name slifit --resource-group slihackathon-2025-team2-rg --query "[?name=='${{ github.sha }}'].status" -o tsv)
          if [ "$DEPLOYMENT_STATUS" = "InProgress" ]; then
            echo "Deployment is still in progress. Waiting..."
            sleep 60
          fi

      - name: "Deploy to Azure Web App"
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "slifit"
          slot-name: "Production"
          package: .
          timeout-minutes: 20
